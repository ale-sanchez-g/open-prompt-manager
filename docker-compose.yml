services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "0:0"
    command: >
      sh -c "mkdir -p /app/data && chown -R appuser:appuser /app/data &&
      su appuser -s /bin/sh -c 'uvicorn main:app --host 0.0.0.0 --port 8000'"
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/prompts.db
      - CORS_ORIGINS=http://localhost,http://localhost:3000,http://localhost:80
      # MCP (Model Context Protocol) server is available at http://localhost:8000/mcp
      # Add any additional host names that MCP clients will use in MCP_ALLOWED_HOSTS.
      - MCP_ALLOWED_HOSTS=localhost,localhost:8000,127.0.0.1,127.0.0.1:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
    driver: local
