name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'

permissions: {}  # Deny all at workflow level — each job opts in explicitly

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, Push, and Terraform Apply
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve deploy configuration
        id: config
        run: |
          set -euo pipefail
          echo "aws_region=${AWS_REGION:-ap-southeast-2}" >> "$GITHUB_OUTPUT"
          echo "project_name=${PROJECT_NAME:-open-prompt-manager}" >> "$GITHUB_OUTPUT"
          echo "environment=${ENVIRONMENT:-prod}" >> "$GITHUB_OUTPUT"
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ steps.config.outputs.aws_region }}
          role-session-name: github-actions-deploy

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.7.5'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve AWS account ID
        id: aws-account
        run: |
          set -euo pipefail
          echo "id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Bootstrap ECR repositories with Terraform
        id: ecr
        working-directory: terraform
        run: |
          set -euo pipefail
          TF_WORKSPACE="${PROJECT_NAME}-${ENVIRONMENT}-${AWS_REGION}"

          terraform init -input=false -reconfigure
          terraform workspace select "${TF_WORKSPACE}" >/dev/null 2>&1 || terraform workspace new "${TF_WORKSPACE}" >/dev/null

          terraform apply -auto-approve \
            -target=aws_ecr_repository.backend \
            -target=aws_ecr_repository.frontend \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="environment=${ENVIRONMENT}"

          echo "backend_repo=$(terraform output -raw backend_ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "frontend_repo=$(terraform output -raw frontend_ecr_repository_url)" >> "$GITHUB_OUTPUT"
        env:
          AWS_REGION: ${{ steps.config.outputs.aws_region }}
          PROJECT_NAME: ${{ steps.config.outputs.project_name }}
          ENVIRONMENT: ${{ steps.config.outputs.environment }}

      - name: Authenticate Docker to ECR
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin \
                "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
        env:
          AWS_REGION: ${{ steps.config.outputs.aws_region }}
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.id }}

      - name: Build and push backend image
        run: |
          set -euo pipefail
          docker buildx build --platform linux/amd64 \
            -t "${BACKEND_REPO}:${DEPLOY_TAG}" \
            -t "${BACKEND_REPO}:latest" \
            "${GITHUB_WORKSPACE}/backend" \
            --push
        env:
          BACKEND_REPO: ${{ steps.ecr.outputs.backend_repo }}
          DEPLOY_TAG: ${{ github.ref_name }}

      - name: Build and push frontend image
        run: |
          set -euo pipefail
          docker buildx build --platform linux/amd64 \
            -t "${FRONTEND_REPO}:${DEPLOY_TAG}" \
            -t "${FRONTEND_REPO}:latest" \
            "${GITHUB_WORKSPACE}/frontend" \
            --push
        env:
          FRONTEND_REPO: ${{ steps.ecr.outputs.frontend_repo }}
          DEPLOY_TAG: ${{ github.ref_name }}

      - name: Terraform apply infrastructure and services
        working-directory: terraform
        run: |
          set -euo pipefail
          terraform apply -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="environment=${ENVIRONMENT}" \
            -var="backend_image=${BACKEND_REPO}:${DEPLOY_TAG}" \
            -var="frontend_image=${FRONTEND_REPO}:${DEPLOY_TAG}"
        env:
          AWS_REGION: ${{ steps.config.outputs.aws_region }}
          PROJECT_NAME: ${{ steps.config.outputs.project_name }}
          ENVIRONMENT: ${{ steps.config.outputs.environment }}
          BACKEND_REPO: ${{ steps.ecr.outputs.backend_repo }}
          FRONTEND_REPO: ${{ steps.ecr.outputs.frontend_repo }}
          DEPLOY_TAG: ${{ github.ref_name }}
