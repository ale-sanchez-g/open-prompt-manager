name: Security Checks

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions: {}  # Deny all at workflow level — each job opts in explicitly

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Secrets scan: detect hardcoded credentials and secrets in source code
  # ─────────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so gitleaks can diff all commits

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.30.1
          GITLEAKS_ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          GITLEAKS_CHECKSUMS="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          GITLEAKS_BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"

          curl -fsSLo "${GITLEAKS_ARCHIVE}" "${GITLEAKS_BASE_URL}/${GITLEAKS_ARCHIVE}"
          curl -fsSLo "${GITLEAKS_CHECKSUMS}" "${GITLEAKS_BASE_URL}/${GITLEAKS_CHECKSUMS}"
          grep "  ${GITLEAKS_ARCHIVE}$" "${GITLEAKS_CHECKSUMS}" > gitleaks.sha256
          sha256sum -c gitleaks.sha256

          tar -xzf "${GITLEAKS_ARCHIVE}" gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks with optional baseline
        id: gitleaks
        run: |
          set +e
          BASELINE_ARG=''
          if [ -f .gitleaks.baseline.json ]; then
            echo 'Using optional baseline: .gitleaks.baseline.json'
            BASELINE_ARG='--baseline-path .gitleaks.baseline.json'
          else
            echo 'No baseline found. Running full scan.'
          fi

          gitleaks git \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-report.sarif \
            ${BASELINE_ARG}
          EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload gitleaks SARIF to code scanning
        if: always() && hashFiles('gitleaks-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-report.sarif

      - name: Upload gitleaks report artifact
        if: always() && hashFiles('gitleaks-report.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif

      - name: Fail job on detected leaks
        if: always()
        run: |
          if [ "${{ steps.gitleaks.outputs.exit_code }}" != "0" ]; then
            echo 'Gitleaks detected one or more secrets. Review code scanning alerts and gitleaks-report artifact.'
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Python SAST: static analysis for common security issues in backend code
  # ─────────────────────────────────────────────────────────────────────────────
  python-sast:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit (medium severity and above)
        run: |
          bandit -r backend/app/ \
            --severity-level medium \
            --confidence-level medium \
            --format json \
            --output bandit-report.json \
            || true
          bandit -r backend/app/ \
            --severity-level medium \
            --confidence-level medium

      - name: Upload bandit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend: npm audit for known CVEs in frontend dependencies
  # ─────────────────────────────────────────────────────────────────────────────
  npm-audit-frontend:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        run: npm audit --audit-level=high

  # ─────────────────────────────────────────────────────────────────────────────
  # MCP Node package: npm audit for known CVEs in MCP Node dependencies
  # ─────────────────────────────────────────────────────────────────────────────
  npm-audit-mcp-node:
    name: npm audit (mcp-package-node)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: mcp-package-node

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-package-node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
