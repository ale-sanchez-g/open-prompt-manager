name: Security Checks

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions: {}  # Deny all at workflow level — each job opts in explicitly

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Secrets scan: detect hardcoded credentials and secrets in source code
  # ─────────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so gitleaks can diff all commits

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.30.1
          GITLEAKS_ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          GITLEAKS_CHECKSUMS="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          GITLEAKS_BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"

          curl -fsSLo "${GITLEAKS_ARCHIVE}" "${GITLEAKS_BASE_URL}/${GITLEAKS_ARCHIVE}"
          curl -fsSLo "${GITLEAKS_CHECKSUMS}" "${GITLEAKS_BASE_URL}/${GITLEAKS_CHECKSUMS}"
          grep "  ${GITLEAKS_ARCHIVE}$" "${GITLEAKS_CHECKSUMS}" > gitleaks.sha256
          sha256sum -c gitleaks.sha256

          tar -xzf "${GITLEAKS_ARCHIVE}" gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks with optional baseline
        id: gitleaks
        run: |
          set +e
          BASELINE_ARG=''
          if [ -f .gitleaks.baseline.json ]; then
            echo 'Using optional baseline: .gitleaks.baseline.json'
            BASELINE_ARG='--baseline-path .gitleaks.baseline.json'
          else
            echo 'No baseline found. Running full scan.'
          fi

          gitleaks git \
            --config .gitleaks.toml \
            --redact \
            --report-format sarif \
            --report-path gitleaks-report.sarif \
            ${BASELINE_ARG}
          EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload gitleaks SARIF to code scanning
        # Skip on fork PRs: GITHUB_TOKEN is read-only for forks and cannot write security-events
        if: >-
          always() &&
          hashFiles('gitleaks-report.sarif') != '' &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-report.sarif

      - name: Upload gitleaks report artifact
        if: always() && hashFiles('gitleaks-report.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif

      - name: Build gitleaks summary and annotations
        if: always()
        id: gitleaks_summary
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          import os

          sarif_file = Path('gitleaks-report.sarif')
          summary_file = Path('gitleaks-pr-summary.md')

          findings = []
          severity_counts = {'critical': 0, 'high': 0, 'medium': 0, 'low': 0, 'unknown': 0}

          if sarif_file.exists():
            data = json.loads(sarif_file.read_text(encoding='utf-8', errors='ignore'))
            runs = data.get('runs', [])
            for run in runs:
              rules = {rule.get('id'): rule for rule in run.get('tool', {}).get('driver', {}).get('rules', [])}
              for result in run.get('results', []):
                message = result.get('message', {}).get('text', 'Secret detected')
                rule_id = result.get('ruleId', 'unknown')
                location = result.get('locations', [{}])[0].get('physicalLocation', {})
                artifact = location.get('artifactLocation', {})
                region = location.get('region', {})
                file_path = artifact.get('uri', 'unknown')
                line = int(region.get('startLine', 1) or 1)

                severity = 'unknown'
                rule = rules.get(rule_id, {})
                properties = rule.get('properties', {}) if isinstance(rule, dict) else {}
                level = str(result.get('level', '')).lower()
                if level == 'error':
                  severity = 'high'
                elif level == 'warning':
                  severity = 'medium'
                elif level == 'note':
                  severity = 'low'

                mapped = str(properties.get('severity', '')).lower()
                if mapped in severity_counts:
                  severity = mapped

                severity_counts[severity] = severity_counts.get(severity, 0) + 1
                findings.append({'message': message, 'rule_id': rule_id, 'file': file_path, 'line': line, 'severity': severity})

          total = len(findings)
          lines = [
            '## Secrets Scan Summary (gitleaks)',
            '',
            f'- Total findings: **{total}**',
            f"- Critical: **{severity_counts['critical']}** | High: **{severity_counts['high']}** | Medium: **{severity_counts['medium']}** | Low: **{severity_counts['low']}** | Unknown: **{severity_counts['unknown']}**",
            ''
          ]

          if total > 0:
            lines.extend([
              '| Severity | Rule | File | Line | Message |',
              '|---|---|---|---:|---|'
            ])
            for finding in findings[:20]:
              safe_message = finding['message'].replace('|', '/').replace('\n', ' ')
              lines.append(
                f"| {finding['severity']} | {finding['rule_id']} | {finding['file']} | {finding['line']} | {safe_message} |"
              )
            if total > 20:
              lines.append('')
              lines.append(f'- Showing first 20 of {total} findings. Download `gitleaks-report` artifact for full details.')
          else:
            lines.append('- No findings detected.')

          summary_text = '\n'.join(lines) + '\n'
          summary_file.write_text(summary_text, encoding='utf-8')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
            fh.write(f'total_findings={total}\n')

          for finding in findings[:20]:
            msg = finding['message'].replace('\n', ' ').strip()
            print(f"::warning file={finding['file']},line={finding['line']}::{finding['severity']} secret finding ({finding['rule_id']}): {msg}")
          PY

      - name: Append gitleaks summary to workflow summary
        if: always()
        run: cat gitleaks-pr-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment gitleaks summary on PR
        if: >-
          always() &&
          github.event_name == 'pull_request' &&
          (github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- gitleaks-pr-summary -->';
            const body = `${marker}\n${fs.readFileSync('gitleaks-pr-summary.md', 'utf8')}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.user.type === 'Bot' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Fail job on detected leaks
        if: always()
        run: |
          if [ "${{ steps.gitleaks.outputs.exit_code }}" != "0" ]; then
            echo 'Gitleaks detected one or more secrets. Review code scanning alerts and gitleaks-report artifact.'
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Python SAST: static analysis for common security issues in backend code
  # ─────────────────────────────────────────────────────────────────────────────
  python-sast:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate SAST suppression register — no expired bandit entries
        run: |
          python3 - <<'PY'
          import json
          import sys
          from datetime import date

          with open('.sast-exceptions.json', encoding='utf-8') as f:
              data = json.load(f)
          today = date.today().isoformat()
          entries = data.get('bandit', [])
          expired = [e for e in entries if e.get('expires', '9999-99-99') < today]
          if expired:
              for e in expired:
                  print(f"::error::Expired SAST suppression: {e['id']} (expired {e['expires']}, owner: {e.get('owner', '?')}).")
              sys.exit(1)
          print(f"SAST suppression register OK — {len(entries)} active bandit suppression(s).")
          PY

      - name: Build bandit suppression flags
        id: bandit_flags
        run: |
          python3 - <<'PY'
          import json
          import os

          with open('.sast-exceptions.json', encoding='utf-8') as f:
              data = json.load(f)

          ids = [e.get('id', '').strip() for e in data.get('bandit', []) if e.get('id')]
          skip = ','.join(ids)
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"skip_ids={skip}\n")
          print(f"bandit skip ids: {skip or '(none)'}")
          PY

      - name: Install bandit
        run: pip install bandit[toml]==1.8.2

      - name: Run bandit (machine-readable JSON report)
        run: |
          bandit -r backend/app/ \
            --severity-level high \
            --confidence-level medium \
            -s "${{ steps.bandit_flags.outputs.skip_ids }}" \
            --format json \
            --output bandit-report.json \
            || true

      - name: Run bandit (enforce standardized fail policy)
        run: |
          bandit -r backend/app/ \
            --severity-level high \
            --confidence-level medium \
            -s "${{ steps.bandit_flags.outputs.skip_ids }}"

      - name: Upload bandit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend SAST: Semgrep static security checks for frontend code
  # Standard fail policy: block on ERROR severity findings.
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-sast:
    name: Frontend SAST (semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate SAST suppression register — no expired semgrep entries
        run: |
          python3 - <<'PY'
          import json
          import sys
          from datetime import date

          with open('.sast-exceptions.json', encoding='utf-8') as f:
              data = json.load(f)
          today = date.today().isoformat()
          entries = data.get('semgrep', [])
          expired = [e for e in entries if e.get('expires', '9999-99-99') < today]
          if expired:
              for e in expired:
                  print(f"::error::Expired SAST suppression: {e['id']} (expired {e['expires']}, owner: {e.get('owner', '?')}).")
              sys.exit(1)
          print(f"SAST suppression register OK — {len(entries)} active semgrep suppression(s).")
          PY

      - name: Build semgrep suppression flags
        id: semgrep_flags
        run: |
          python3 - <<'PY'
          import json
          import os

          with open('.sast-exceptions.json', encoding='utf-8') as f:
              data = json.load(f)

          ids = [e.get('id', '').strip() for e in data.get('semgrep', []) if e.get('id')]
          flags = ' '.join(f"--exclude-rule {i}" for i in ids)
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"exclude_flags={flags}\n")
          print(f"semgrep exclude flags: {flags or '(none)'}")
          PY

      - name: Install semgrep
        run: pip install semgrep==1.75.0

      - name: Run semgrep (machine-readable SARIF report)
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/react \
            ${{ steps.semgrep_flags.outputs.exclude_flags }} \
            --sarif \
            --output semgrep-report.sarif \
            frontend/src \
            || true

      - name: Run semgrep (enforce standardized fail policy)
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/react \
            ${{ steps.semgrep_flags.outputs.exclude_flags }} \
            --severity ERROR \
            --error \
            frontend/src

      - name: Upload semgrep SARIF artifact
        uses: actions/upload-artifact@v7
        if: always() && hashFiles('semgrep-report.sarif') != ''
        with:
          name: semgrep-report
          path: semgrep-report.sarif
          retention-days: 30

      - name: Upload semgrep SARIF to code scanning
        if: >-
          always() &&
          hashFiles('semgrep-report.sarif') != '' &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-report.sarif

  # ─────────────────────────────────────────────────────────────────────────────
  # IaC static security checks: Checkov for Terraform configurations
  # Standard fail policy: block on HIGH/CRITICAL findings.
  # ─────────────────────────────────────────────────────────────────────────────
  iac-sast:
    name: IaC SAST (checkov)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate SAST suppression register — no expired checkov entries
        run: |
          python3 - <<'PY'
          import json
          import sys
          from datetime import date

          with open('.sast-exceptions.json', encoding='utf-8') as f:
              data = json.load(f)
          today = date.today().isoformat()
          entries = data.get('checkov', [])
          expired = [e for e in entries if e.get('expires', '9999-99-99') < today]
          if expired:
              for e in expired:
                  print(f"::error::Expired SAST suppression: {e['id']} (expired {e['expires']}, owner: {e.get('owner', '?')}).")
              sys.exit(1)
          print(f"SAST suppression register OK — {len(entries)} active checkov suppression(s).")
          PY

      - name: Build checkov suppression flags
        id: checkov_flags
        run: |
          python3 - <<'PY'
          import json
          import os

          with open('.sast-exceptions.json', encoding='utf-8') as f:
              data = json.load(f)

          ids = [e.get('id', '').strip() for e in data.get('checkov', []) if e.get('id')]
          skip = ','.join(ids)
          skip_arg = f"--skip-check {skip}" if skip else ''
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"skip_arg={skip_arg}\n")
          print(f"checkov skip ids: {skip or '(none)'}")
          PY

      - name: Install checkov
        run: pip install checkov==3.2.521

      - name: Run checkov (machine-readable reports)
        run: |
          checkov \
            -d terraform \
            --framework terraform \
            ${{ steps.checkov_flags.outputs.skip_arg }} \
            -o json \
            --output-file-path checkov-report.json \
            || true

          checkov \
            -d terraform \
            --framework terraform \
            ${{ steps.checkov_flags.outputs.skip_arg }} \
            -o sarif \
            --output-file-path checkov-report.sarif \
            || true

      - name: Run checkov (enforce standardized fail policy)
        run: |
          checkov \
            -d terraform \
            --framework terraform \
            ${{ steps.checkov_flags.outputs.skip_arg }} \
            --soft-fail-on LOW,MEDIUM \
            --hard-fail-on HIGH,CRITICAL

      - name: Upload checkov JSON report
        uses: actions/upload-artifact@v7
        if: always() && hashFiles('checkov-report.json') != ''
        with:
          name: checkov-report-json
          path: checkov-report.json
          retention-days: 30

      - name: Upload checkov SARIF artifact
        uses: actions/upload-artifact@v7
        if: always() && hashFiles('checkov-report.sarif') != ''
        with:
          name: checkov-report-sarif
          path: checkov-report.sarif
          retention-days: 30

      - name: Upload checkov SARIF to code scanning
        if: >-
          always() &&
          hashFiles('checkov-report.sarif') != '' &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov-report.sarif

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend: npm audit for known CVEs in frontend dependencies
  # ─────────────────────────────────────────────────────────────────────────────
  npm-audit-frontend:
    name: npm audit SCA (frontend)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate SCA exception register — no expired npm/frontend entries
        working-directory: ${{ github.workspace }}
        run: |
          python3 - <<'PY'
          import json, sys
          from datetime import date

          with open('.sca-exceptions.json') as f:
              data = json.load(f)
          today = date.today().isoformat()
          entries = data.get('npm', {}).get('frontend', [])
          expired = [e for e in entries if e.get('expires', '9999-99-99') < today]
          if expired:
              for e in expired:
                  print(f"::error::Expired SCA exception: {e['id']} (expired {e['expires']}, owner: {e.get('owner', '?')}). Resolve the vulnerability or renew the exception.")
              sys.exit(1)
          print(f"Exception register OK — {len(entries)} active npm/frontend exception(s).")
          PY

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (machine-readable JSON report)
        run: npm audit --json 2>/dev/null > npm-audit-report.json || true

      - name: Run npm audit (enforce — fail on high/critical)
        run: npm audit --audit-level=high

      - name: Upload npm audit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: npm-audit-report-frontend
          path: frontend/npm-audit-report.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # MCP Node package: npm audit for known CVEs in MCP Node dependencies
  # ─────────────────────────────────────────────────────────────────────────────
  npm-audit-mcp-node:
    name: npm audit SCA (mcp-package-node)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: mcp-package-node

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate SCA exception register — no expired npm/mcp-node entries
        working-directory: ${{ github.workspace }}
        run: |
          python3 - <<'PY'
          import json, sys
          from datetime import date

          with open('.sca-exceptions.json') as f:
              data = json.load(f)
          today = date.today().isoformat()
          entries = data.get('npm', {}).get('mcp-package-node', [])
          expired = [e for e in entries if e.get('expires', '9999-99-99') < today]
          if expired:
              for e in expired:
                  print(f"::error::Expired SCA exception: {e['id']} (expired {e['expires']}, owner: {e.get('owner', '?')}). Resolve the vulnerability or renew the exception.")
              sys.exit(1)
          print(f"Exception register OK — {len(entries)} active npm/mcp-package-node exception(s).")
          PY

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-package-node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (machine-readable JSON report)
        run: npm audit --json 2>/dev/null > npm-audit-report.json || true

      - name: Run npm audit (enforce — fail on high/critical)
        run: npm audit --audit-level=high

      - name: Upload npm audit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: npm-audit-report-mcp-package-node
          path: mcp-package-node/npm-audit-report.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # SCA summary: aggregate all npm audit findings into a single PR comment
  # ─────────────────────────────────────────────────────────────────────────────
  sca-npm-summary:
    name: SCA npm Summary
    runs-on: ubuntu-latest
    needs: [npm-audit-frontend, npm-audit-mcp-node]
    if: always() && github.event_name == 'pull_request' && (github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download npm audit reports
        uses: actions/download-artifact@v4
        with:
          pattern: npm-audit-report-*
          path: sca-reports
          merge-multiple: false

      - name: Build and post SCA summary PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const marker = '<!-- sca-npm-summary -->';
            const reportsDir = 'sca-reports';
            const ecosystems = [
              { label: 'frontend', dir: 'npm-audit-report-frontend' },
              { label: 'mcp-package-node', dir: 'npm-audit-report-mcp-package-node' },
            ];

            const rows = [];
            let totalHigh = 0, totalCritical = 0, totalModerate = 0, grandTotal = 0;

            for (const eco of ecosystems) {
              const reportFile = path.join(reportsDir, eco.dir, 'npm-audit-report.json');
              if (!fs.existsSync(reportFile)) {
                rows.push(`| ${eco.label} | N/A | N/A | N/A | N/A | report not generated |`);
                continue;
              }
              let data;
              try { data = JSON.parse(fs.readFileSync(reportFile, 'utf8')); } catch {
                rows.push(`| ${eco.label} | N/A | N/A | N/A | N/A | parse error |`);
                continue;
              }
              const meta = data?.metadata?.vulnerabilities ?? {};
              const critical = meta.critical ?? 0;
              const high = meta.high ?? 0;
              const moderate = meta.moderate ?? 0;
              const total = meta.total ?? 0;
              const status = (critical + high) > 0 ? 'FAIL' : 'PASS';
              rows.push(`| ${eco.label} | ${critical} | ${high} | ${moderate} | ${total} | ${status} |`);
              totalCritical += critical;
              totalHigh += high;
              totalModerate += moderate;
              grandTotal += total;
            }

            const overallStatus = (totalCritical + totalHigh) > 0 ? 'FAIL' : 'PASS';
            const body = [
              marker,
              '## SCA npm Dependency Scan Summary',
              '',
              `- Overall status: **${overallStatus}**`,
              `- Critical: **${totalCritical}** | High: **${totalHigh}** | Moderate: **${totalModerate}** | Total: **${grandTotal}**`,
              '',
              '| Ecosystem | Critical | High | Moderate | Total | Status |',
              '|---|---:|---:|---:|---:|---|',
              ...rows,
              '',
              '_Exceptions are managed in `.sca-exceptions.json`. Download `npm-audit-report-*` artifacts for full details._',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
