name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions: {}  # Deny all at workflow level — each job opts in explicitly

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Terraform: validate configuration and run the test suite (no AWS creds needed)
  # ─────────────────────────────────────────────────────────────────────────────
  terraform:
    name: Terraform Validate & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Test
        run: terraform test

  # ─────────────────────────────────────────────────────────────────────────────
  # MCP Python package: unit tests
  # ─────────────────────────────────────────────────────────────────────────────
  mcp-python-test:
    name: MCP Python Package Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: mcp-package-python

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: mcp-package-python/pyproject.toml

      - name: Install package with test dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest tests/ -v

  # ─────────────────────────────────────────────────────────────────────────────
  # MCP Node.js package: unit tests
  # ─────────────────────────────────────────────────────────────────────────────
  mcp-node-test:
    name: MCP Node.js Package Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: mcp-package-node

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-package-node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend: lint, unit tests, API integration tests, coverage
  # ─────────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend: dependency vulnerability scan (pip-audit)
  # ─────────────────────────────────────────────────────────────────────────────
  pip-audit:
    name: pip-audit (dependency vulnerability scan)
    runs-on: ubuntu-latest
    needs: backend-test
    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt --format json --output pip-audit-report.json || true
          pip-audit --requirement requirements.txt

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pip-audit-report
          path: backend/pip-audit-report.json

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend: install, lint (build check), unit tests
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests (CI mode, no watch)
        run: npm test -- --coverage --coverage.reporter=lcov --coverage.reporter=text --coverage.outDir=coverage
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend: production build verification
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-test
    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production bundle
        run: npm run build

      - name: Check build output exists
        run: test -d build && test -f build/index.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker: build both images (no push — validates Dockerfiles)
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, pip-audit, frontend-build]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          tags: prompt-manager-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: false
          tags: prompt-manager-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # End-to-end tests: spin up docker-compose, run the full Playwright suite
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-smoke:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start services
        run: docker compose up -d --build
        env:
          COMPOSE_HTTP_TIMEOUT: "120"

      - name: Wait for backend to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Backend did not become healthy in time"
          docker compose logs backend
          exit 1

      - name: Wait for frontend to be serving
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80 || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Frontend is serving"
              exit 0
            fi
            sleep 3
          done
          echo "Frontend did not become available in time"
          docker compose logs frontend
          exit 1

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e-test/package-lock.json

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e-test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e-test

      - name: Run Playwright E2E tests
        run: npm run test:api
        working-directory: e2e-test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: e2e-test/playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-test-results
          path: e2e-test/test-results/
          retention-days: 7

      - name: Publish JUnit report to Checks
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Playwright E2E Results
          path: e2e-test/test-results/junit.xml
          reporter: java-junit

      - name: Build E2E summary table
        if: always()
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import xml.etree.ElementTree as ET

          junit_path = Path('e2e-test/test-results/junit.xml')
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"

          tests = failures = errors = skipped = 0
          duration = 0.0

          if junit_path.exists():
              root = ET.parse(junit_path).getroot()
              suites = [root] if root.tag == 'testsuite' else [s for s in root.findall('testsuite')]
              for suite in suites:
                  tests += int(float(suite.attrib.get('tests', '0')))
                  failures += int(float(suite.attrib.get('failures', '0')))
                  errors += int(float(suite.attrib.get('errors', '0')))
                  skipped += int(float(suite.attrib.get('skipped', '0')))
                  duration += float(suite.attrib.get('time', '0') or 0)

          passed = max(tests - failures - errors - skipped, 0)
          failed = failures + errors

          summary_table = (
              '| Metric | Value |\n'
              '|---|---:|\n'
              f'| Passed | {passed} |\n'
              f'| Failed | {failed} |\n'
              f'| Skipped | {skipped} |\n'
              f'| Total | {tests} |\n'
              f'| Execution Time (s) | {duration:.2f} |\n'
          )

          step_summary = (
              '## Playwright E2E Report\n\n'
              f'- Workflow run: {run_url}\n'
              '- Download artifact: open this run and download the `playwright-report` artifact from the Artifacts section\n\n'
              + summary_table
          )

          Path(os.environ['GITHUB_STEP_SUMMARY']).write_text(step_summary + '\n', encoding='utf-8', errors='ignore')

          pr_comment = (
              '<!-- playwright-e2e-report -->\n'
              '## Playwright E2E Report\n\n'
              f'- Run: {run_url}\n'
              '- Download the `playwright-report` artifact from the run Artifacts section.\n'
              '- Test traces/screenshots are in the `playwright-test-results` artifact.\n\n'
              + summary_table
          )

          Path('e2e-test/test-results/pr-comment.md').write_text(pr_comment, encoding='utf-8')
          PY

      - name: Add E2E report to run summary
        if: always()
        run: echo "Playwright E2E summary generated from JUnit report."

      - name: Comment E2E report link on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request.number;
            const marker = '<!-- playwright-e2e-report -->';
            const body = fs.readFileSync('e2e-test/test-results/pr-comment.md', 'utf8');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.login === 'github-actions[bot]' &&
                comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Print service logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down -v