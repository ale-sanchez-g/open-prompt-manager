name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions: {}  # Deny all at workflow level — each job opts in explicitly

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Pre-build gate: split linting by stack for isolated and faster feedback
  # ─────────────────────────────────────────────────────────────────────────────
  prebuild-lint-matrix:
    name: Pre-Build Lint (${{ matrix.stack }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: backend
            setup: python
            lint_command: |
              python -m pip install --upgrade pip
              python -m pip install ruff==0.6.9
              ruff check --select E9,F63,F7,F82 backend
          - stack: frontend
            setup: node
            lint_command: |
              cd frontend
              npm ci --legacy-peer-deps
              npm run lint:ci
          - stack: mcp-package-python
            setup: python
            lint_command: |
              python -m pip install --upgrade pip
              python -m pip install ruff==0.6.9
              ruff check --select E9,F63,F7,F82 mcp-package-python
          - stack: mcp-package-node
            setup: node
            lint_command: |
              cd mcp-package-node
              npm ci
              npm run lint:ci
          - stack: terraform
            setup: terraform
            lint_command: |
              cd terraform
              terraform fmt -check -recursive

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        if: matrix.setup == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up Node 24
        if: matrix.setup == 'node'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Terraform
        if: matrix.setup == 'terraform'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.7.5"

      - name: Run stack lint validation
        run: ${{ matrix.lint_command }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Version pinning/lock integrity gate:
  # - Python requirements must be exact pins (==) for deploy/runtime paths.
  # - npm lockfiles must exist and stay in sync with package manifests.
  # ─────────────────────────────────────────────────────────────────────────────
  version-pinning-check:
    name: Version Pinning Check
    runs-on: ubuntu-latest
    needs: prebuild-lint-matrix
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Validate Python dependency pinning (backend requirements)
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import sys

          files = [
              Path('backend/requirements.txt'),
              Path('backend/requirements-test.txt'),
              Path('backend/requirements-mutation.txt'),
          ]

          violations = []

          def allowed_non_pin(spec: str) -> bool:
              return (
                  spec.startswith('#')
                  or spec.startswith('-r ')
                  or spec.startswith('--requirement ')
                  or spec.startswith('-c ')
                  or spec.startswith('--constraint ')
                  or spec.startswith('-e ')
                  or ' @ ' in spec
                  or spec.startswith('git+')
                  or spec.startswith('http://')
                  or spec.startswith('https://')
              )

          for req_file in files:
              if not req_file.exists():
                  violations.append((str(req_file), 0, 'missing requirements file'))
                  continue
              for line_no, raw in enumerate(req_file.read_text(encoding='utf-8', errors='ignore').splitlines(), start=1):
                  spec = raw.strip()
                  if not spec:
                      continue
                  if allowed_non_pin(spec):
                      continue
                  if '==' not in spec:
                      violations.append((str(req_file), line_no, spec))

          if violations:
              for file_path, line_no, content in violations:
                  if line_no > 0:
                      print(f"::error file={file_path},line={line_no}::Unpinned Python dependency (expected exact '=='): {content}")
                  else:
                      print(f"::error file={file_path}::{content}")
              print(f'Found {len(violations)} pinning violation(s) in backend requirements files.')
              sys.exit(1)

          print('Python pinning check passed: backend requirements are exact-pinned or explicitly allowed.')
          PY

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Verify lockfiles exist
        run: |
          test -f frontend/package-lock.json || (echo '::error file=frontend/package.json::Missing frontend/package-lock.json' && exit 1)
          test -f mcp-package-node/package-lock.json || (echo '::error file=mcp-package-node/package.json::Missing mcp-package-node/package-lock.json' && exit 1)

      - name: Verify frontend lockfile integrity (npm ci)
        working-directory: frontend
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Verify mcp-node lockfile integrity (npm ci)
        working-directory: mcp-package-node
        run: npm ci --ignore-scripts

      - name: Detect lockfile drift against manifests
        run: |
          set -euo pipefail
          if ! git diff --quiet -- frontend/package-lock.json mcp-package-node/package-lock.json; then
            echo '::error::Lockfile drift detected after npm ci. Ensure manifests and lockfiles are synchronized and committed.'
            git --no-pager diff -- frontend/package-lock.json mcp-package-node/package-lock.json | sed -n '1,200p'
            exit 1
          fi

      - name: Write version pinning summary
        if: always()
        run: |
          cat > version-pinning-summary.md <<'EOF'
          ## Version Pinning Check Summary

          - Python (backend): exact pin verification on `backend/requirements.txt` and `backend/requirements-test.txt`
          - Node (frontend + mcp-node): lockfile integrity via `npm ci`
          - Drift detection: fail if lockfiles mutate after `npm ci` and fail on lock/manifests mismatch
          EOF
          cat version-pinning-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment version pinning summary on PR
        if: >-
          always() &&
          github.event_name == 'pull_request' &&
          (github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- version-pinning-summary -->';
            const body = `${marker}\n${fs.readFileSync('version-pinning-summary.md', 'utf8')}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.user.type === 'Bot' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  # ─────────────────────────────────────────────────────────────────────────────
  # Terraform: validate configuration and run the test suite (no AWS creds needed)
  # ─────────────────────────────────────────────────────────────────────────────
  terraform:
    name: Terraform Validate & Test
    runs-on: ubuntu-latest
    needs: [prebuild-lint-matrix, version-pinning-check]
    permissions:
      contents: read

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.7.5"

      - name: Terraform Fmt Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Test
        run: terraform test

  # ─────────────────────────────────────────────────────────────────────────────
  # MCP Python package: unit tests
  # ─────────────────────────────────────────────────────────────────────────────
  mcp-python-test:
    name: MCP Python Package Tests
    runs-on: ubuntu-latest
    needs: [prebuild-lint-matrix, version-pinning-check]
    permissions:
      contents: read

    defaults:
      run:
        working-directory: mcp-package-python

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: mcp-package-python/pyproject.toml

      - name: Install package with test dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest tests/ -v

  # ─────────────────────────────────────────────────────────────────────────────
  # MCP Node.js package: unit tests
  # ─────────────────────────────────────────────────────────────────────────────
  mcp-node-test:
    name: MCP Node.js Package Tests
    runs-on: ubuntu-latest
    needs: [prebuild-lint-matrix, version-pinning-check]
    permissions:
      contents: read

    defaults:
      run:
        working-directory: mcp-package-node

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: mcp-package-node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend: lint, unit tests, API integration tests, coverage
  # ─────────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [prebuild-lint-matrix, version-pinning-check]
    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ─────────────────────────────────────────────────────────────────────────────
  # Mutation testing: validates test suite quality beyond line coverage.
  # Mutates app/ source code and checks that tests catch the introduced faults.
  # Targets 30 sampled locations with a fixed seed for reproducibility.
  # Survivors above the threshold (5) fail the job — tighten as coverage improves.
  # ─────────────────────────────────────────────────────────────────────────────
  backend-mutation-test:
    name: Backend Mutation Tests
    runs-on: ubuntu-latest
    needs: backend-test
    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements-mutation.txt

      - name: Install dependencies
        run: pip install -r requirements-mutation.txt

      - name: Run mutation tests (mutmut)
        run: |
          mutmut run --ignore-tests tests/test_migrations.py
          mutmut results > mutation_report.txt

      - name: Upload mutation report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-mutation-report
          path: backend/mutation_report.txt
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # SCA: pip-audit vulnerability scan across all Python ecosystems
  # Covers: backend (requirements.txt) and mcp-package-python (pyproject.toml deps)
  # Exceptions are managed in .sca-exceptions.json — expired entries block CI.
  # ─────────────────────────────────────────────────────────────────────────────
  pip-audit:
    name: pip-audit SCA (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: backend-test
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            install_cmd: pip install -r backend/requirements.txt
            req_file: backend/requirements.txt
            report_path: backend/pip-audit-report.json
          - name: mcp-package-python
            install_cmd: >-
              pip install -e mcp-package-python &&
              pip freeze --exclude-editable > mcp-package-python/requirements-generated.txt
            req_file: mcp-package-python/requirements-generated.txt
            report_path: mcp-package-python/pip-audit-report.json

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Validate SCA exception register — no expired entries
        run: |
          python3 - <<'PY'
          import json, sys
          from datetime import date

          with open('.sca-exceptions.json') as f:
              data = json.load(f)
          today = date.today().isoformat()
          expired = [e for e in data.get('pip', []) if e.get('expires', '9999-99-99') < today]
          if expired:
              for e in expired:
                  print(f"::error::Expired SCA exception: {e['id']} (expired {e['expires']}, owner: {e.get('owner', '?')}). Resolve the vulnerability or renew the exception.")
              sys.exit(1)
          print(f"Exception register OK — {len(data.get('pip', []))} active pip exception(s).")
          PY

      - name: Build pip-audit ignore flags from exception register
        id: ignore_flags
        run: |
          python3 - <<'PY'
          import json, os

          with open('.sca-exceptions.json') as f:
              data = json.load(f)
          flags = ' '.join(f"--ignore-vuln {e['id']}" for e in data.get('pip', []))
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f"flags={flags}\n")
          print(f"pip-audit ignore flags: {flags or '(none)'}")
          PY

      - name: Install pip-audit
        run: pip install pip-audit==2.8.0

      - name: Install package dependencies
        run: ${{ matrix.install_cmd }}

      - name: Run pip-audit (machine-readable JSON report)
        run: |
          pip-audit \
            --requirement ${{ matrix.req_file }} \
            ${{ steps.ignore_flags.outputs.flags }} \
            --format json \
            --output ${{ matrix.report_path }} \
            || true

      - name: Run pip-audit (enforce — fail on any vulnerability)
        run: |
          pip-audit \
            --requirement ${{ matrix.req_file }} \
            ${{ steps.ignore_flags.outputs.flags }}

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pip-audit-report-${{ matrix.name }}
          path: ${{ matrix.report_path }}
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend: install, lint (build check), unit tests
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [prebuild-lint-matrix, version-pinning-check]
    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests (CI mode, no watch)
        run: npm test -- --coverage --coverage.reporter=lcov --coverage.reporter=text --coverage.outDir=coverage
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ─────────────────────────────────────────────────────────────────────────────
  # Code quality scan: enforce coverage thresholds and report complexity metrics
  # ─────────────────────────────────────────────────────────────────────────────
  code-quality-scan:
    name: Code Quality Scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code (for complexity scan)
        uses: actions/checkout@v6

      - name: Download backend coverage artifact
        uses: actions/download-artifact@v5
        with:
          name: backend-coverage
          path: quality-reports/backend

      - name: Download frontend coverage artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend-coverage
          path: quality-reports/frontend

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install complexity tools
        run: pip install radon==6.0.1

      - name: Run backend complexity scan (radon)
        run: |
          mkdir -p quality-reports
          radon cc backend/app -j > quality-reports/radon-cc.json
          radon mi backend/app -j > quality-reports/radon-mi.json

      - name: Evaluate quality gates and build summary
        id: quality_eval
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          from collections import Counter
          import xml.etree.ElementTree as ET
          from pathlib import Path

          BACKEND_MIN = 80.0
          FRONTEND_MIN = 80.0

          reports_dir = Path('quality-reports')
          reports_dir.mkdir(exist_ok=True)

          backend_cov_file = next((p for p in (reports_dir / 'backend').rglob('coverage.xml')), None)
          frontend_lcov_file = next((p for p in (reports_dir / 'frontend').rglob('lcov.info')), None)

          if backend_cov_file is None:
              print('::error::backend coverage.xml not found in downloaded artifact.')
              sys.exit(1)
          if frontend_lcov_file is None:
              print('::error::frontend lcov.info not found in downloaded artifact.')
              sys.exit(1)

          root = ET.parse(backend_cov_file).getroot()
          backend_cov = float(root.attrib.get('line-rate', '0')) * 100.0

          lf = 0
          lh = 0
          with frontend_lcov_file.open(encoding='utf-8', errors='ignore') as f:
              for line in f:
                  line = line.strip()
                  if line.startswith('LF:'):
                      lf += int(line.split(':', 1)[1])
                  elif line.startswith('LH:'):
                      lh += int(line.split(':', 1)[1])
          frontend_cov = (lh / lf * 100.0) if lf > 0 else 0.0

          # Lightweight duplication heuristic for backend Python code:
          # exact normalized line matches, excluding blanks/comments.
          total_code_lines = 0
          line_counter = Counter()
          for py_file in Path('backend/app').rglob('*.py'):
              try:
                  with py_file.open(encoding='utf-8', errors='ignore') as fh:
                      for raw in fh:
                          normalized = raw.strip()
                          if not normalized or normalized.startswith('#'):
                              continue
                          total_code_lines += 1
                          line_counter[normalized] += 1
              except OSError:
                  continue

          duplicated_line_occurrences = sum(count for count in line_counter.values() if count > 1)
          duplicated_unique_lines = sum(1 for count in line_counter.values() if count > 1)
          duplication_pct = (duplicated_line_occurrences / total_code_lines * 100.0) if total_code_lines > 0 else 0.0

          cc_file = reports_dir / 'radon-cc.json'
          mi_file = reports_dir / 'radon-mi.json'
          cc_data = json.loads(cc_file.read_text(encoding='utf-8')) if cc_file.exists() else {}
          mi_data = json.loads(mi_file.read_text(encoding='utf-8')) if mi_file.exists() else {}

          all_blocks = []
          high_risk_blocks = []
          for file_path, blocks in cc_data.items():
              for block in blocks:
                  complexity = float(block.get('complexity', 0) or 0)
                  rank = str(block.get('rank', 'A'))
                  all_blocks.append(complexity)
                  if rank in {'D', 'E', 'F'} or complexity >= 21:
                      high_risk_blocks.append({
                          'file': file_path,
                          'name': block.get('name', '<unknown>'),
                          'complexity': complexity,
                          'rank': rank,
                      })

          avg_complexity = (sum(all_blocks) / len(all_blocks)) if all_blocks else 0.0

          mi_values = []
          for value in mi_data.values():
              if isinstance(value, (int, float)):
                  mi_values.append(float(value))
                  continue
              if isinstance(value, dict):
                  raw_mi = value.get('mi', value.get('maintainability_index'))
                  if isinstance(raw_mi, (int, float)):
                      mi_values.append(float(raw_mi))
          avg_mi = (sum(mi_values) / len(mi_values)) if mi_values else None

          backend_pass = backend_cov >= BACKEND_MIN
          frontend_pass = frontend_cov >= FRONTEND_MIN
          overall_pass = backend_pass and frontend_pass

          status_backend = 'PASS' if backend_pass else 'FAIL'
          status_frontend = 'PASS' if frontend_pass else 'FAIL'
          overall_status = 'PASS' if overall_pass else 'FAIL'

          summary_lines = [
              '## Code Quality Scan Summary',
              '',
              f'- Overall status: **{overall_status}**',
              f'- Coverage thresholds: backend >= **{BACKEND_MIN:.0f}%**, frontend >= **{FRONTEND_MIN:.0f}%**',
              '',
              '| Gate | Result | Observed | Threshold |',
              '|---|---|---:|---:|',
              f'| Backend Coverage | {status_backend} | {backend_cov:.2f}% | {BACKEND_MIN:.0f}% |',
              f'| Frontend Coverage | {status_frontend} | {frontend_cov:.2f}% | {FRONTEND_MIN:.0f}% |',
              '',
              '### Optional Duplication/Complexity Metrics (informational)',
              '',
              f'- Backend duplicated line occurrences (exact-line heuristic): **{duplicated_line_occurrences}** / **{total_code_lines}** ({duplication_pct:.2f}%)',
              f'- Backend unique duplicated line patterns: **{duplicated_unique_lines}**',
              f'- Backend average cyclomatic complexity: **{avg_complexity:.2f}**',
              (
                  f'- Backend average maintainability index: **{avg_mi:.2f}**'
                  if avg_mi is not None
                  else '- Backend average maintainability index: **N/A** (unable to parse radon MI output)'
              ),
              f'- High-risk complexity blocks (rank D/E/F): **{len(high_risk_blocks)}**',
          ]

          if high_risk_blocks:
              summary_lines.extend([
                  '',
                  '| File | Symbol | Complexity | Rank |',
                  '|---|---|---:|---|',
              ])
              for block in high_risk_blocks[:10]:
                  summary_lines.append(
                      f"| {block['file']} | {block['name']} | {block['complexity']:.0f} | {block['rank']} |"
                  )
              if len(high_risk_blocks) > 10:
                  summary_lines.append(f'- Showing first 10 of {len(high_risk_blocks)} high-risk blocks.')

          summary_text = '\n'.join(summary_lines) + '\n'
          (reports_dir / 'quality-summary.md').write_text(summary_text, encoding='utf-8')
          Path(os.environ['GITHUB_STEP_SUMMARY']).write_text(summary_text, encoding='utf-8')

          metrics = {
              'overall_status': overall_status,
              'backend_coverage': round(backend_cov, 2),
              'frontend_coverage': round(frontend_cov, 2),
              'backend_threshold': BACKEND_MIN,
              'frontend_threshold': FRONTEND_MIN,
              'backend_total_code_lines': total_code_lines,
              'backend_duplicated_line_occurrences': duplicated_line_occurrences,
              'backend_duplicated_unique_lines': duplicated_unique_lines,
              'backend_duplication_pct': round(duplication_pct, 2),
              'avg_complexity': round(avg_complexity, 2),
              'avg_maintainability_index': (round(avg_mi, 2) if avg_mi is not None else None),
              'high_risk_blocks': len(high_risk_blocks),
          }
          (reports_dir / 'quality-metrics.json').write_text(json.dumps(metrics, indent=2) + '\n', encoding='utf-8')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"overall_status={overall_status}\n")

          if not overall_pass:
              print('::error::Code quality gate failed due to coverage threshold breach.')
              sys.exit(1)
          PY

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: code-quality-report
          path: quality-reports/
          retention-days: 30

      - name: Comment code quality summary on PR
        if: >-
          always() &&
          github.event_name == 'pull_request' &&
          (github.event.pull_request.head.repo.full_name == github.repository) &&
          hashFiles('quality-reports/quality-summary.md') != ''
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- code-quality-summary -->';
            const body = `${marker}\n${fs.readFileSync('quality-reports/quality-summary.md', 'utf8')}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.user.type === 'Bot' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend: production build verification
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-test, code-quality-scan]
    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production bundle
        run: npm run build

      - name: Check build output exists
        run: test -d build && test -f build/index.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker: build both images (no push — validates Dockerfiles)
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, pip-audit, frontend-build]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          tags: prompt-manager-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: false
          tags: prompt-manager-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # End-to-end tests: spin up docker-compose, run the full Playwright suite
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-smoke:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start services
        run: docker compose up -d --build
        env:
          COMPOSE_HTTP_TIMEOUT: "120"

      - name: Wait for backend to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Backend did not become healthy in time"
          docker compose logs backend
          exit 1

      - name: Wait for frontend to be serving
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80 || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Frontend is serving"
              exit 0
            fi
            sleep 3
          done
          echo "Frontend did not become available in time"
          docker compose logs frontend
          exit 1

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: e2e-test/package-lock.json

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e-test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e-test

      - name: Run Playwright E2E tests
        run: npm run test:api
        working-directory: e2e-test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: e2e-test/playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-test-results
          path: e2e-test/test-results/
          retention-days: 7

      - name: Publish JUnit report to Checks
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Playwright E2E Results
          path: e2e-test/test-results/junit.xml
          reporter: java-junit

      - name: Build E2E summary table
        if: always()
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import xml.etree.ElementTree as ET

          junit_path = Path('e2e-test/test-results/junit.xml')
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"

          tests = failures = errors = skipped = 0
          duration = 0.0

          if junit_path.exists():
              root = ET.parse(junit_path).getroot()
              suites = [root] if root.tag == 'testsuite' else [s for s in root.findall('testsuite')]
              for suite in suites:
                  tests += int(float(suite.attrib.get('tests', '0')))
                  failures += int(float(suite.attrib.get('failures', '0')))
                  errors += int(float(suite.attrib.get('errors', '0')))
                  skipped += int(float(suite.attrib.get('skipped', '0')))
                  duration += float(suite.attrib.get('time', '0') or 0)

          passed = max(tests - failures - errors - skipped, 0)
          failed = failures + errors

          summary_table = (
              '| Metric | Value |\n'
              '|---|---:|\n'
              f'| Passed | {passed} |\n'
              f'| Failed | {failed} |\n'
              f'| Skipped | {skipped} |\n'
              f'| Total | {tests} |\n'
              f'| Execution Time (s) | {duration:.2f} |\n'
          )

          step_summary = (
              '## Playwright E2E Report\n\n'
              f'- Workflow run: {run_url}\n'
              '- Download artifact: open this run and download the `playwright-report` artifact from the Artifacts section\n\n'
              + summary_table
          )

          Path(os.environ['GITHUB_STEP_SUMMARY']).write_text(step_summary + '\n', encoding='utf-8', errors='ignore')

          pr_comment = (
              '<!-- playwright-e2e-report -->\n'
              '## Playwright E2E Report\n\n'
              f'- Run: {run_url}\n'
              '- Download the `playwright-report` artifact from the run Artifacts section.\n'
              '- Test traces/screenshots are in the `playwright-test-results` artifact.\n\n'
              + summary_table
          )

          Path('e2e-test/test-results/pr-comment.md').write_text(pr_comment, encoding='utf-8')
          PY

      - name: Add E2E report to run summary
        if: always()
        run: echo "Playwright E2E summary generated from JUnit report."

      - name: Comment E2E report link on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request.number;
            const marker = '<!-- playwright-e2e-report -->';
            const body = fs.readFileSync('e2e-test/test-results/pr-comment.md', 'utf8');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.login === 'github-actions[bot]' &&
                comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Print service logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down -v
